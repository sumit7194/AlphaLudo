<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaLudo — Play vs AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">♟</span>
                <h1>Alpha<span class="accent">Ludo</span></h1>
                <span class="model-chip" id="modelChip">Loading…</span>
            </div>
            <div class="header-actions">
                <button id="newGameBtn" class="btn btn-primary" onclick="newGame()">
                    <span class="btn-icon">↻</span>
                    <span>New Game</span>
                </button>
            </div>
        </header>

        <main class="game-container">
            <!-- LEFT: Human (You) — placed on the side that matches your tokens (top-left of board, P0) -->
            <aside class="player-panel human-panel">
                <div class="player-card human">
                    <div class="player-header">
                        <div class="player-avatar human-avatar">🎮</div>
                        <div class="player-name-block">
                            <h3>You</h3>
                            <p class="player-subtitle">Player 0 · Green</p>
                        </div>
                    </div>

                    <div class="score-display">
                        <div class="score-label-row">
                            <span class="score-label-text">Tokens Home</span>
                            <span class="score-label" id="human-score-label">0 / 4</span>
                        </div>
                        <div class="score-tokens">
                            <span class="scored-token human-color" id="human-scored-0"></span>
                            <span class="scored-token human-color" id="human-scored-1"></span>
                            <span class="scored-token human-color" id="human-scored-2"></span>
                            <span class="scored-token human-color" id="human-scored-3"></span>
                        </div>
                    </div>

                    <div class="status-pill" id="humanStatusPill">
                        <span class="status-dot"></span>
                        <span id="humanStatusText">Waiting…</span>
                    </div>
                </div>

                <!-- Game Log -->
                <div class="game-log">
                    <h4>Game Log</h4>
                    <div class="log-entries" id="logEntries"></div>
                </div>
            </aside>

            <!-- CENTER: Board -->
            <div class="board-wrapper">
                <!-- Turn Indicator -->
                <div class="turn-indicator" id="turnIndicator">
                    <span id="turnText">Your Turn</span>
                </div>

                <!-- Dice Area -->
                <div class="dice-area">
                    <div class="dice" id="dice" onclick="rollDice()">
                        <span id="diceValue">?</span>
                    </div>
                    <p class="dice-hint" id="diceHint">Click to roll</p>
                    <button class="btn btn-ghost btn-restart" onclick="newGame()" title="Start a fresh game">
                        <span class="btn-icon">⟳</span>
                        <span>Restart</span>
                    </button>
                </div>

                <!-- Board Grid -->
                <div class="board" id="board">
                    <!-- 15x15 grid cells injected by JS -->
                </div>

                <!-- Message Area -->
                <div class="message-area" id="messageArea"></div>
            </div>

            <!-- RIGHT: AI Panel — placed on the side matching AI tokens (bottom-right of board, P2) -->
            <aside class="player-panel ai-panel">
                <div class="player-card ai">
                    <div class="player-header">
                        <div class="player-avatar ai-avatar">🤖</div>
                        <div class="player-name-block">
                            <h3>AlphaLudo AI</h3>
                            <p class="player-subtitle" id="aiSubtitle">Loading...</p>
                        </div>
                    </div>

                    <div class="score-display">
                        <div class="score-label-row">
                            <span class="score-label-text">Tokens Home</span>
                            <span class="score-label" id="ai-score-label">0 / 4</span>
                        </div>
                        <div class="score-tokens">
                            <span class="scored-token ai-color" id="ai-scored-0"></span>
                            <span class="scored-token ai-color" id="ai-scored-1"></span>
                            <span class="scored-token ai-color" id="ai-scored-2"></span>
                            <span class="scored-token ai-color" id="ai-scored-3"></span>
                        </div>
                    </div>

                    <div class="status-pill" id="aiStatusPill">
                        <span class="status-dot"></span>
                        <span id="aiStatusText">Waiting…</span>
                    </div>

                    <div class="ai-thinking" id="aiThinking">
                        <div class="thinking-dots"><span></span><span></span><span></span></div>
                        <span>Thinking...</span>
                    </div>

                    <!-- AI's predicted win chance -->
                    <div class="win-chance" id="winChanceBox">
                        <div class="win-chance-label">AI's Predicted Win Chance</div>
                        <div class="win-chance-bar">
                            <div class="win-chance-fill" id="winChanceFill" style="width: 50%;"></div>
                        </div>
                        <div class="win-chance-text">
                            <span id="winChanceAi">50%</span>
                            <span class="win-chance-vs">AI vs You</span>
                            <span id="winChanceHuman">50%</span>
                        </div>
                    </div>

                    <div class="ai-probs-wrapper">
                        <div class="ai-probs-label">Move probabilities (last decision)</div>
                        <div class="ai-probs" id="aiProbs"></div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Win Modal -->
        <div class="modal-overlay" id="winModal">
            <div class="modal">
                <div class="modal-icon" id="modalIcon">🏆</div>
                <h2 id="modalTitle">You Win!</h2>
                <p id="modalSubtext">Congratulations!</p>
                <button class="btn btn-primary" onclick="newGame()">Play Again</button>
            </div>
        </div>
    </div>
    <script src="/static/game.js"></script>
</body>
</html>
